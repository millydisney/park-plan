<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>TODAY'S PLAN</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #111111;
      --muted: #666666;
      --line: #e8e8e8;
      --soft: #f7f7f7;
      --dpa: #d91f26;
      --pp: #34a853;
      --mo: #f28a00;
      --show: #1267b1;
      --shadow: 0 8px 26px rgba(0,0,0,.08);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans", "Yu Gothic", sans-serif;
    }

    button, input, select, textarea {
      font: inherit;
    }

    .page {
      width: min(980px, 100%);
      margin: 0 auto;
      padding: 18px 14px 34px;
    }

    .mode-label {
      display: inline-block;
      color: #fff;
      font-weight: 900;
      border-radius: 7px;
      padding: 6px 18px;
      margin-bottom: 8px;
      letter-spacing: .04em;
      background: #e94a58;
    }

    .shot .mode-label {
      display: none;
    }

    header {
      text-align: center;
      padding: 10px 0 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 7vw, 58px);
      line-height: 1;
      letter-spacing: .05em;
      font-weight: 950;
    }

    .resort-icons {
      font-size: clamp(28px, 6vw, 48px);
      vertical-align: middle;
      display: inline-block;
      transform: translateY(-2px);
    }

    .decor {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      color: #c99329;
      margin: 12px auto 14px;
      max-width: 560px;
    }

    .decor:before, .decor:after {
      content: "";
      height: 1px;
      background: #bcbcbc;
      flex: 1;
    }

    .date-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: #222;
      font-size: 15px;
      font-weight: 700;
      margin-top: 2px;
    }

    .date-row input {
      border: 0;
      background: transparent;
      font-weight: 800;
      text-align: center;
      width: 130px;
      padding: 4px;
    }

    .date-row .sep {
      color: #aaa;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 18px;
      align-items: start;
    }

    .content {
      min-width: 0;
    }

    .next-card {
      position: relative;
      border: 2px solid var(--dpa);
      border-radius: 18px;
      min-height: 178px;
      padding: 28px 22px 22px;
      box-shadow: 0 8px 18px rgba(217,31,38,.08);
      overflow: hidden;
      background: #fff;
    }

    .next-ribbon {
      position: absolute;
      top: 11px;
      left: -34px;
      transform: rotate(-18deg);
      background: var(--dpa);
      color: #fff;
      font-weight: 950;
      letter-spacing: .08em;
      padding: 7px 38px;
      font-size: 17px;
      box-shadow: 0 6px 12px rgba(217,31,38,.18);
    }

    .next-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 16px;
      padding-left: 42px;
    }

    .next-title {
      font-size: 22px;
      font-weight: 950;
    }

    .countdown {
      font-size: 15px;
      font-weight: 800;
      color: #222;
      white-space: nowrap;
    }

    .countdown strong {
      color: var(--dpa);
      font-size: 32px;
      padding: 0 2px;
    }

    .next-body {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 16px;
      align-items: center;
    }

    .icon {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      color: #fff;
      display: grid;
      place-items: center;
      text-align: center;
      font-weight: 950;
      line-height: 1.05;
      box-shadow: inset 0 -10px 20px rgba(0,0,0,.08);
      flex: 0 0 auto;
    }

    .icon .emoji { font-size: 22px; display: block; margin-bottom: 2px; }
    .icon .abbr { font-size: 18px; }

    .next-time {
      font-size: 30px;
      font-weight: 950;
      color: var(--dpa);
      letter-spacing: .03em;
      margin-bottom: 8px;
    }

    .next-name {
      font-size: 25px;
      font-weight: 950;
      line-height: 1.25;
    }

    .next-memo {
      margin-top: 10px;
      font-size: 15px;
      color: #222;
      line-height: 1.4;
    }

    .castle-watermark {
      position: absolute;
      right: 20px;
      bottom: 10px;
      font-size: 110px;
      opacity: .08;
      color: var(--dpa);
      pointer-events: none;
    }

    .section-head {
      margin: 28px 0 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 23px;
      font-weight: 950;
      flex: 1;
    }

    .small-btn {
      width: auto;
      background: #fff;
      color: #111;
      border: 1px solid var(--line);
      box-shadow: none;
      padding: 9px 14px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 850;
    }

    .plans {
      display: flex;
      flex-direction: column;
      gap: 11px;
    }

    .plan-card {
      --c: #111;
      display: grid;
      grid-template-columns: 100px 1fr 34px;
      gap: 12px;
      align-items: center;
      background: #fff;
      border: 1px solid var(--line);
      border-left: 8px solid var(--c);
      border-radius: 18px;
      padding: 14px 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,.045);
    }

    .plan-time {
      color: var(--c);
      font-weight: 950;
      font-size: 17px;
      line-height: 1.15;
      text-align: center;
    }

    .plan-main {
      min-width: 0;
    }

    .plan-name {
      font-weight: 950;
      font-size: 18px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .plan-memo {
      color: #333;
      font-size: 14px;
      line-height: 1.35;
      margin-top: 6px;
      overflow-wrap: anywhere;
    }

    .delete {
      width: 32px;
      height: 32px;
      border: 0;
      border-radius: 50%;
      background: #f1f1f1;
      color: #777;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
    }

    .empty {
      padding: 26px 14px;
      border: 1px dashed #d8d8d8;
      border-radius: 18px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }

    .input-panel {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,.045);
      margin-bottom: 10px;
    }

    .input-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 950;
      margin-bottom: 12px;
    }

    .type-buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .type-btn {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      padding: 8px 5px;
      font-size: 13px;
      font-weight: 950;
      cursor: pointer;
      color: #111;
    }

    .type-btn.active {
      color: #fff;
      border-color: transparent;
      background: var(--active);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
      margin-bottom: 6px;
    }

    select, input {
      width: 100%;
      height: 42px;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 9px;
      padding: 8px 10px;
      color: #111;
      outline: none;
    }

    .full {
      grid-column: 1 / -1;
    }

    .add-btn {
      border: 0;
      border-radius: 10px;
      background: var(--dpa);
      color: #fff;
      width: 100%;
      height: 44px;
      font-weight: 950;
      margin-top: 12px;
      cursor: pointer;
      box-shadow: 0 6px 12px rgba(217,31,38,.15);
    }

    .side {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .side-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      padding: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,.035);
    }

    .side-card h3 {
      text-align: center;
      font-size: 16px;
      margin: 0 0 12px;
      font-weight: 950;
    }

    .legend-item {
      display: grid;
      grid-template-columns: 44px 1fr;
      gap: 10px;
      align-items: center;
      padding: 9px 0;
      border-top: 1px solid var(--line);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.35;
    }

    .mini-icon {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 11px;
      font-weight: 950;
      text-align: center;
    }

    .tips {
      margin: 0;
      padding-left: 18px;
      color: #222;
      font-size: 12px;
      line-height: 1.8;
      font-weight: 700;
    }

    .shot-toggle {
      border: 0;
      border-radius: 10px;
      background: var(--show);
      color: #fff;
      width: 100%;
      height: 43px;
      font-weight: 950;
      cursor: pointer;
    }

    .footer-decor {
      display: flex;
      align-items: center;
      gap: 18px;
      color: #c99329;
      margin: 28px auto 0;
    }

    .footer-decor:before, .footer-decor:after {
      content: "";
      height: 1px;
      border-top: 2px dotted #bbb;
      flex: 1;
    }

    .shot .input-panel,
    .shot .side,
    .shot .delete,
    .shot .small-btn,
    .shot .mode-label {
      display: none !important;
    }

    .shot .main-grid {
      display: block;
      max-width: 720px;
      margin: 0 auto;
    }

    .shot .page {
      max-width: 780px;
      padding-top: 28px;
    }

    .shot .next-card {
      margin-top: 10px;
    }

    .shot .section-head {
      margin-top: 28px;
    }

    .shot .plan-card {
      grid-template-columns: 100px 1fr;
    }

    .shot-back {
      display: none;
      position: fixed;
      right: 14px;
      bottom: 14px;
      width: auto;
      border: 0;
      border-radius: 999px;
      background: #111;
      color: #fff;
      padding: 12px 16px;
      font-weight: 900;
      box-shadow: var(--shadow);
      z-index: 10;
    }

    .shot .shot-back {
      display: block;
    }

    @media (max-width: 760px) {
      .page {
        padding: 10px 10px 28px;
      }

      .main-grid {
        grid-template-columns: 1fr;
      }

      .side {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .next-card {
        padding: 26px 15px 18px;
      }

      .next-head {
        padding-left: 34px;
      }

      .next-body {
        grid-template-columns: 78px 1fr;
        gap: 12px;
      }

      .icon {
        width: 66px;
        height: 66px;
      }

      .next-time {
        font-size: 25px;
      }

      .next-name {
        font-size: 21px;
      }

      .plan-card {
        grid-template-columns: 82px 1fr 30px;
      }

      .plan-time {
        font-size: 15px;
      }

      .plan-name {
        font-size: 16px;
      }
    }

    @media (max-width: 520px) {
      .mode-label {
        display: none;
      }

      header {
        padding-top: 14px;
      }

      .resort-icons {
        font-size: 25px;
      }

      h1 {
        font-size: 34px;
      }

      .date-row {
        font-size: 13px;
        gap: 6px;
      }

      .side {
        grid-template-columns: 1fr;
      }

      .type-buttons {
        grid-template-columns: repeat(4, 1fr);
      }

      .type-btn {
        font-size: 12px;
        padding: 8px 3px;
      }

      .form-grid {
        grid-template-columns: 1fr 1fr;
      }

      .next-card {
        min-height: 166px;
      }

      .next-ribbon {
        font-size: 14px;
      }

      .next-title {
        font-size: 18px;
      }

      .countdown strong {
        font-size: 26px;
      }

      .castle-watermark {
        font-size: 86px;
      }

      .plan-card {
        grid-template-columns: 74px 1fr 28px;
        gap: 10px;
        padding: 12px 9px;
      }

      .icon {
        width: 60px;
        height: 60px;
      }

      .section-head h2 {
        font-size: 20px;
      }

      .small-btn {
        padding: 8px 10px;
      }

      .shot .page {
        padding-top: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="mode-label">入力モード</div>

    <header>
      <h1><span class="resort-icons">🏰</span> TODAY'S PLAN <span class="resort-icons">🌋</span></h1>
      <div class="decor">✦</div>
      <div class="date-row">
        <span>📅</span>
        <input id="dateInput" type="date" />
        <span class="sep">|</span>
        <span>東京ディズニーリゾート</span>
      </div>
    </header>

    <div class="main-grid">
      <div class="content">
        <section class="next-card" id="nextCard">
          <div class="next-ribbon">NEXT</div>
          <div class="next-head">
            <div class="next-title">🕘 次の予定</div>
            <div class="countdown" id="countdown"></div>
          </div>
          <div id="nextBody"></div>
          <div class="castle-watermark">🏰</div>
        </section>

        <section class="input-panel">
          <div class="input-title">
            <span>＋ 予定を追加する</span>
          </div>

          <div class="type-buttons" id="typeButtons">
            <button class="type-btn active" type="button" data-type="DPA" style="--active: var(--dpa)">DPA<br><small>有料</small></button>
            <button class="type-btn" type="button" data-type="PP" style="--active: var(--pp)">PP<br><small>パス</small></button>
            <button class="type-btn" type="button" data-type="MO" style="--active: var(--mo)">MO<br><small>注文</small></button>
            <button class="type-btn" type="button" data-type="SHOW" style="--active: var(--show)">SHOW<br><small>ショー</small></button>
          </div>

          <div class="form-grid">
            <div>
              <label for="start">開始時間</label>
              <select id="start"></select>
            </div>
            <div>
              <label for="end">終了時間（任意）</label>
              <select id="end"></select>
            </div>
            <div class="full">
              <label for="title">タイトル</label>
              <input id="title" type="text" placeholder="例：美女と野獣" />
            </div>
            <div class="full">
              <label for="memo">メモ（任意）</label>
              <input id="memo" type="text" placeholder="例：12:20〜12:30受取" />
            </div>
          </div>

          <button class="add-btn" id="addBtn" type="button">追加する</button>
        </section>

        <div class="section-head">
          <h2>☰ 今日の予定一覧</h2>
          <button class="small-btn" id="sortBtn" type="button">↕ 時間順</button>
          <button class="small-btn" id="clearBtn" type="button">全削除</button>
        </div>

        <section class="plans" id="plans"></section>
        <div class="footer-decor">✦</div>
      </div>

      <aside class="side">
        <section class="side-card">
          <h3>アイコンの見方</h3>
          <div class="legend-item"><div class="mini-icon" style="background:var(--dpa)">DPA</div><div>ディズニー・プレミアアクセス（有料）</div></div>
          <div class="legend-item"><div class="mini-icon" style="background:var(--pp)">PP</div><div>プライオリティパス</div></div>
          <div class="legend-item"><div class="mini-icon" style="background:var(--mo)">MO</div><div>モバイルオーダー</div></div>
          <div class="legend-item"><div class="mini-icon" style="background:var(--show)">SHOW</div><div>ショー・パレード</div></div>
        </section>

        <section class="side-card">
          <h3>使い方メモ</h3>
          <ul class="tips">
            <li>「追加」から予定を登録</li>
            <li>5分刻みで時間を選択</li>
            <li>時間順で自動並び替え</li>
            <li>メモ欄に自由にメモ</li>
            <li>スクショモードで保存</li>
          </ul>
        </section>

        <section class="side-card">
          <h3>スクショモード</h3>
          <p class="tips" style="padding-left:0; list-style:none;">予定一覧だけのきれいな画面になります。</p>
          <button class="shot-toggle" id="shotBtn" type="button">📷 スクショモード</button>
        </section>
      </aside>
    </div>
  </main>

  <button class="shot-back" id="editBtn" type="button">編集に戻る</button>

  <script>
    const COLORS = {
      DPA: getComputedStyle(document.documentElement).getPropertyValue("--dpa").trim(),
      PP: getComputedStyle(document.documentElement).getPropertyValue("--pp").trim(),
      MO: getComputedStyle(document.documentElement).getPropertyValue("--mo").trim(),
      SHOW: getComputedStyle(document.documentElement).getPropertyValue("--show").trim()
    };

    const INFO = {
      DPA: { label: "DPA", emoji: "✦", name: "ディズニー・プレミアアクセス" },
      PP: { label: "PP", emoji: "🎩", name: "プライオリティパス" },
      MO: { label: "MO", emoji: "🍴", name: "モバイルオーダー" },
      SHOW: { label: "SHOW", emoji: "🏰", name: "ショー・パレード" }
    };

    let selectedType = "DPA";
    let plans = loadPlans();

    const startEl = document.getElementById("start");
    const endEl = document.getElementById("end");
    const titleEl = document.getElementById("title");
    const memoEl = document.getElementById("memo");
    const plansEl = document.getElementById("plans");
    const nextBodyEl = document.getElementById("nextBody");
    const countdownEl = document.getElementById("countdown");
    const dateInput = document.getElementById("dateInput");

    function safeStorageGet(key, fallback) {
      try { return localStorage.getItem(key) ?? fallback; } catch(e) { return fallback; }
    }

    function safeStorageSet(key, value) {
      try { localStorage.setItem(key, value); } catch(e) {}
    }

    function loadPlans() {
      try {
        return JSON.parse(localStorage.getItem("millyDisneyPlans") || "[]");
      } catch(e) {
        return [];
      }
    }

    function savePlans() {
      safeStorageSet("millyDisneyPlans", JSON.stringify(plans));
    }

    function pad(num) {
      return String(num).padStart(2, "0");
    }

    function makeTimeOptions() {
      const options = ['<option value="">なし</option>'];
      for (let h = 7; h <= 23; h++) {
        for (let m = 0; m < 60; m += 5) {
          const t = `${pad(h)}:${pad(m)}`;
          options.push(`<option value="${t}">${t}</option>`);
        }
      }
      startEl.innerHTML = options.filter((_, i) => i !== 0).join("");
      endEl.innerHTML = options.join("");
    }

    function setToday() {
      const saved = safeStorageGet("millyDisneyDate", "");
      if (saved) {
        dateInput.value = saved;
      } else {
        const d = new Date();
        dateInput.value = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
      }
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, m => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
      }[m]));
    }

    function timeRange(plan) {
      return plan.end ? `${plan.start}〜${plan.end}` : plan.start;
    }

    function toMinutes(t) {
      if (!t) return 99999;
      const [h, m] = t.split(":").map(Number);
      return h * 60 + m;
    }

    function sortedPlans() {
      return [...plans].sort((a,b) => toMinutes(a.start) - toMinutes(b.start));
    }

    function minutesNow() {
      const n = new Date();
      return n.getHours() * 60 + n.getMinutes();
    }

    function nextPlan() {
      const sorted = sortedPlans();
      if (sorted.length === 0) return null;
      const now = minutesNow();
      return sorted.find(p => toMinutes(p.end || p.start) >= now) || sorted[0];
    }

    function countdownText(plan) {
      if (!plan) return "";
      const diff = toMinutes(plan.start) - minutesNow();
      if (diff > 0) return `あと <strong>${diff}</strong> 分 ✨`;
      if (plan.end && toMinutes(plan.end) >= minutesNow()) return `利用時間中 ✨`;
      return "";
    }

    function iconHtml(type) {
      const i = INFO[type];
      return `<div class="icon" style="background:${COLORS[type]}"><span class="emoji">${i.emoji}</span><span class="abbr">${i.label}</span></div>`;
    }

    function renderNext() {
      const p = nextPlan();
      if (!p) {
        countdownEl.innerHTML = "";
        nextBodyEl.innerHTML = `
          <div class="empty" style="grid-column:1/-1;">予定を追加すると、次の予定がここに大きく表示されます</div>
        `;
        document.getElementById("nextCard").style.borderColor = COLORS.DPA;
        return;
      }

      document.getElementById("nextCard").style.borderColor = COLORS[p.type];
      countdownEl.innerHTML = countdownText(p);
      nextBodyEl.innerHTML = `
        <div class="next-body">
          ${iconHtml(p.type)}
          <div>
            <div class="next-time" style="color:${COLORS[p.type]}">${timeRange(p)}</div>
            <div class="next-name">${escapeHtml(p.title)}</div>
            ${p.memo ? `<div class="next-memo">メモ：${escapeHtml(p.memo)}</div>` : ""}
          </div>
        </div>
      `;
    }

    function renderPlans() {
      const sorted = sortedPlans();
      plansEl.innerHTML = "";
      if (sorted.length === 0) {
        plansEl.innerHTML = `<div class="empty">まだ予定がありません<br>入力モードで予定を追加してね</div>`;
        return;
      }

      sorted.forEach((p) => {
        const originalIndex = plans.indexOf(p);
        const card = document.createElement("div");
        card.className = "plan-card";
        card.style.setProperty("--c", COLORS[p.type]);
        card.innerHTML = `
          <div class="plan-time">${timeRange(p)}</div>
          <div class="plan-main">
            <div style="display:flex;gap:10px;align-items:center;">
              <div class="mini-icon" style="background:${COLORS[p.type]};border-radius:50%;width:48px;height:48px;">${INFO[p.type].label}</div>
              <div>
                <div class="plan-name">${escapeHtml(p.title)}</div>
                ${p.memo ? `<div class="plan-memo">メモ：${escapeHtml(p.memo)}</div>` : ""}
              </div>
            </div>
          </div>
          <button class="delete" type="button" aria-label="削除">×</button>
        `;
        card.querySelector(".delete").addEventListener("click", () => {
          plans.splice(originalIndex, 1);
          savePlans();
          render();
        });
        plansEl.appendChild(card);
      });
    }

    function render() {
      renderNext();
      renderPlans();
    }

    function addPlan() {
      const title = titleEl.value.trim();
      const start = startEl.value;
      const end = endEl.value;
      const memo = memoEl.value.trim();

      if (!title || !start) {
        alert("開始時間とタイトルを入れてね");
        return;
      }

      if (end && toMinutes(end) < toMinutes(start)) {
        alert("終了時間は開始時間より後にしてね");
        return;
      }

      plans.push({
        type: selectedType,
        title,
        start,
        end,
        memo,
        id: Date.now()
      });

      savePlans();
      titleEl.value = "";
      memoEl.value = "";
      endEl.value = "";
      render();
      titleEl.focus();
    }

    document.querySelectorAll(".type-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        selectedType = btn.dataset.type;
        document.querySelectorAll(".type-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        document.querySelector(".add-btn").style.background = COLORS[selectedType];
      });
    });

    document.getElementById("addBtn").addEventListener("click", addPlan);
    document.getElementById("sortBtn").addEventListener("click", render);
    document.getElementById("clearBtn").addEventListener("click", () => {
      if (confirm("予定を全部削除しますか？")) {
        plans = [];
        savePlans();
        render();
      }
    });

    document.getElementById("shotBtn").addEventListener("click", () => {
      document.body.classList.add("shot");
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    document.getElementById("editBtn").addEventListener("click", () => {
      document.body.classList.remove("shot");
    });

    dateInput.addEventListener("change", () => {
      safeStorageSet("millyDisneyDate", dateInput.value);
    });

    titleEl.addEventListener("keydown", e => {
      if (e.key === "Enter") addPlan();
    });

    makeTimeOptions();
    setToday();

    if (plans.length === 0) {
      plans = [
        { type: "DPA", title: "美女と野獣 “魔法のものがたり”", start: "10:00", end: "11:00", memo: "城前経由で移動", id: 1 },
        { type: "PP", title: "モンスターズ・インク “ライド&ゴーシーク!”", start: "11:30", end: "12:30", memo: "FP終了後はトゥモローへ", id: 2 },
        { type: "MO", title: "ハングリーベア・レストラン", start: "12:00", end: "12:30", memo: "12:20〜12:30受取", id: 3 },
        { type: "SHOW", title: "クラブマウスビート", start: "15:30", end: "16:10", memo: "トゥモロー側で鑑賞予定", id: 4 }
      ];
    }

    render();
    setInterval(renderNext, 60000);
  </script>
</body>
</html>
